name: Render visual audit PDFs

on:
  push:
    branches: [audit-render]
    paths:
      - '.github/workflows/render-audit.yml'
      - 'carole-vallat-assets.zip'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PDF dependencies
        run: python -m pip install --quiet pillow reportlab

      - name: Build audit PDFs
        run: |
          python - <<'PY'
          from __future__ import annotations
          import math
          import os
          import shutil
          import tempfile
          import zipfile
          from pathlib import Path
          from PIL import Image, ImageOps, ImageDraw, ImageFont
          from reportlab.pdfgen import canvas
          from reportlab.lib.utils import ImageReader

          ROOT = Path.cwd()
          ZIP = ROOT / 'carole-vallat-assets.zip'
          SRC = ROOT / '_audit_assets'
          OUT = ROOT / 'audit'
          TMP = ROOT / '_audit_tmp'
          shutil.rmtree(SRC, ignore_errors=True)
          shutil.rmtree(TMP, ignore_errors=True)
          OUT.mkdir(exist_ok=True)
          TMP.mkdir(exist_ok=True)

          if not ZIP.exists():
              raise SystemExit('carole-vallat-assets.zip not found')
          with zipfile.ZipFile(ZIP) as zf:
              zf.extractall(SRC)

          exts = {'.png', '.jpg', '.jpeg', '.webp'}
          files = sorted(p for p in SRC.rglob('*') if p.is_file() and p.suffix.lower() in exts)
          if not files:
              raise SystemExit('No images found in ZIP')

          def rel(p: Path) -> str:
              return p.relative_to(SRC).as_posix()

          groups: dict[str, list[Path]] = {}
          for p in files:
              parts = p.relative_to(SRC).parts
              group = parts[0] if len(parts) > 1 else 'root'
              groups.setdefault(group, []).append(p)

          manifest = []
          for group, items in sorted(groups.items()):
              manifest.append(f'[{group}] ({len(items)})')
              for p in items:
                  with Image.open(p) as im:
                      manifest.append(f'{rel(p)}\t{im.width}x{im.height}\t{p.stat().st_size} bytes')
              manifest.append('')
          (OUT / '00-manifest.txt').write_text('\n'.join(manifest), encoding='utf-8')

          def open_rgb(path: Path) -> Image.Image:
              im = Image.open(path)
              im = ImageOps.exif_transpose(im)
              if im.mode in ('RGBA', 'LA'):
                  bg = Image.new('RGB', im.size, 'white')
                  bg.paste(im, mask=im.getchannel('A'))
                  return bg
              return im.convert('RGB')

          def fit(im: Image.Image, max_w: int, max_h: int) -> Image.Image:
              c = im.copy()
              c.thumbnail((max_w, max_h), Image.Resampling.LANCZOS)
              return c

          def temp_jpeg(im: Image.Image, stem: str, idx: int, max_w: int = 1800, max_h: int = 1800) -> Path:
              scaled = fit(im, max_w, max_h)
              out = TMP / f'{stem}-{idx:04d}.jpg'
              scaled.save(out, 'JPEG', quality=86, optimize=True, progressive=True)
              return out

          def draw_title(c: canvas.Canvas, title: str, pw: float, ph: float, dark: bool = False) -> float:
              bar_h = 42
              c.setFillColorRGB(0.08, 0.08, 0.08) if dark else c.setFillColorRGB(0.96, 0.95, 0.92)
              c.rect(0, ph-bar_h, pw, bar_h, stroke=0, fill=1)
              c.setFillColorRGB(1,1,1) if dark else c.setFillColorRGB(0.12,0.10,0.08)
              c.setFont('Helvetica-Bold', 14)
              shown = title if len(title) <= 120 else title[:117] + '...'
              c.drawString(20, ph-27, shown)
              return bar_h

          def draw_image_fit(c: canvas.Canvas, img_path: Path, x: float, y: float, w: float, h: float):
              with Image.open(img_path) as im:
                  iw, ih = im.size
              scale = min(w/iw, h/ih)
              dw, dh = iw*scale, ih*scale
              c.drawImage(ImageReader(str(img_path)), x+(w-dw)/2, y+(h-dh)/2, width=dw, height=dh, preserveAspectRatio=True, mask='auto')

          # 01 — global 2x2 contact sheets
          overview_path = OUT / '01-all-assets-overview.pdf'
          c = canvas.Canvas(str(overview_path), pagesize=(1200, 900), pageCompression=1)
          ordered = []
          for group in ('references', 'apercu-captures', 'photos-carole'):
              ordered.extend(groups.get(group, []))
          ordered.extend([p for p in files if p not in ordered])
          for page_i in range(0, len(ordered), 4):
              batch = ordered[page_i:page_i+4]
              c.setPageSize((1200,900))
              c.setFillColorRGB(0.93,0.92,0.89); c.rect(0,0,1200,900,stroke=0,fill=1)
              c.setFillColorRGB(0.1,0.09,0.08); c.setFont('Helvetica-Bold',18)
              c.drawString(24, 868, f'Carole Vallat — assets overview — page {page_i//4+1}')
              cells = [(20,450,570,390),(610,450,570,390),(20,30,570,390),(610,30,570,390)]
              for i,(p,cell) in enumerate(zip(batch,cells)):
                  x,y,w,h = cell
                  c.setFillColorRGB(1,1,1); c.roundRect(x,y,w,h,8,stroke=0,fill=1)
                  c.setFillColorRGB(0.15,0.13,0.11); c.setFont('Helvetica-Bold',11)
                  title = rel(p)
                  c.drawString(x+12,y+h-22,title[:85])
                  im = open_rgb(p)
                  jp = temp_jpeg(im, 'overview', page_i+i, 1100, 680)
                  draw_image_fit(c,jp,x+12,y+12,w-24,h-48)
              c.showPage()
          c.save()

          def build_detail_pdf(paths: list[Path], dest: Path, slice_selected: bool, key_names: set[str] | None = None):
              c = canvas.Canvas(str(dest), pageCompression=1)
              page_counter = 0
              for p in paths:
                  im = open_rgb(p)
                  # Full-page overview
                  portrait = im.height > im.width * 1.22
                  pw, ph = ((760, 1180) if portrait else (1200, 900))
                  c.setPageSize((pw, ph)); c.setFillColorRGB(0.94,0.93,0.90); c.rect(0,0,pw,ph,stroke=0,fill=1)
                  bar = draw_title(c, rel(p), pw, ph)
                  jp = temp_jpeg(im, 'detail', page_counter, 2200, 2600); page_counter += 1
                  draw_image_fit(c, jp, 18, 18, pw-36, ph-bar-30)
                  c.showPage()

                  selected = slice_selected and (key_names is None or p.name in key_names)
                  if not selected:
                      continue
                  # Readable vertical slices for long screenshots
                  ratio = im.height / max(im.width,1)
                  if ratio <= 1.25:
                      continue
                  chunk_h = int(im.width * (2.05 if im.width < 700 else 0.68))
                  chunk_h = max(500, min(chunk_h, im.height))
                  overlap = max(0, int(chunk_h * 0.06))
                  step = max(1, chunk_h - overlap)
                  starts = list(range(0, max(1, im.height-chunk_h+1), step))
                  last = max(0, im.height-chunk_h)
                  if not starts or starts[-1] != last:
                      starts.append(last)
                  for sidx, top in enumerate(starts, start=1):
                      crop = im.crop((0, top, im.width, min(im.height, top+chunk_h)))
                      cpw, cph = ((760, 1180) if im.width < 700 else (1200, 900))
                      c.setPageSize((cpw,cph)); c.setFillColorRGB(0.94,0.93,0.90); c.rect(0,0,cpw,cph,stroke=0,fill=1)
                      bar = draw_title(c, f'{rel(p)} — slice {sidx}/{len(starts)}', cpw, cph, dark=True)
                      jp = temp_jpeg(crop, 'slice', page_counter, 2400, 2400); page_counter += 1
                      draw_image_fit(c,jp,12,12,cpw-24,cph-bar-22)
                      c.showPage()
              c.save()

          previews = groups.get('apercu-captures', [])
          refs = groups.get('references', [])
          photos = groups.get('photos-carole', [])
          build_detail_pdf(previews, OUT/'02-current-previews-detail.pdf', True)

          key_names = {
              'joia-desktop.png','joia-mobile.png','ref-studio-forma.jpg','ref-studio-theclass.jpg',
              'ref-studio-heartcore.jpg','ref-studio-pvolve.jpg','ref-aesop.png','ref-aman.png',
              'ref-frama.png','ref-kinfolk.png','ref-norm.png','ref-sirenuse.png','heckfield-desktop.png',
              'verbier-desktop.png','verbier-mobile.png','blancspace-desktop.png','blancspace-mobile.png',
              'gingembre-desktop.png','gingembre-mobile.png','tia-desktop.png','yogarise-desktop.png',
              'menopausecare-desktop.png','menopausecare-mobile.png','irenelyon-desktop.png'
          }
          build_detail_pdf(refs, OUT/'03-reference-library-detail.pdf', True, key_names)
          build_detail_pdf(photos, OUT/'04-carole-photos.pdf', False)
          print(f'Rendered {len(files)} images into audit PDFs')
          PY

      - name: Commit generated audit files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add audit
          if git diff --cached --quiet; then
            echo 'No generated changes'
            exit 0
          fi
          git commit -m 'Generate visual audit PDFs [skip ci]'
          git push origin HEAD:audit-render
