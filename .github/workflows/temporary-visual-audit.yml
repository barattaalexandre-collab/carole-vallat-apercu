name: Temporary visual audit artifact

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --quiet pillow reportlab

      - name: Render visual audit PDFs
        run: python tools/build_visual_audit.py

      - name: Upload audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: carole-vallat-visual-audit
          path: audit-artifact/
          if-no-files-found: error
          retention-days: 2
